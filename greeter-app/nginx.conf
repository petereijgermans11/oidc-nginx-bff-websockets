server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API requests to BFF (nginx-gateway)
  location /api/ {
    proxy_pass http://nginx-gateway:8080;
    # Use the BFF's internal host, not the frontend host
    proxy_set_header Host localhost:8080;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Pass the original origin so BFF knows where the request came from
    proxy_set_header X-Forwarded-Host $host;
    
    # Pass cookies from client to BFF
    proxy_cookie_path / /;
    # Rewrite cookie domain if needed (but we're on localhost, so this might not be necessary)
    # proxy_cookie_domain localhost:8008 localhost:8090;
    
    # Don't add CORS headers here - let BFF handle them
    # This prevents duplicate headers and potential loops
    proxy_hide_header 'Access-Control-Allow-Origin';
    proxy_hide_header 'Access-Control-Allow-Credentials';
    proxy_hide_header 'Access-Control-Allow-Methods';
    proxy_hide_header 'Access-Control-Allow-Headers';
    
    # Pass through CORS headers from BFF
    proxy_pass_header 'Access-Control-Allow-Origin';
    proxy_pass_header 'Access-Control-Allow-Credentials';
    proxy_pass_header 'Access-Control-Allow-Methods';
    proxy_pass_header 'Access-Control-Allow-Headers';
    
    # Don't follow redirects - pass them through to client
    proxy_redirect off;
    
    # Pass through all status codes (including 401, 403, etc.)
    proxy_intercept_errors off;
    
    # Handle preflight
    if ($request_method = 'OPTIONS') {
      proxy_pass http://nginx-gateway:8080;
      break;
    }
  }

  # Proxy WebSocket requests to BFF (nginx-gateway)
  location /ws/ {
    proxy_pass http://nginx-gateway:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Pass cookies from client to BFF (important for authentication)
    proxy_set_header Cookie $http_cookie;
    
    # WebSocket timeouts
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
    
    # Pass through CORS headers from BFF
    proxy_pass_header 'Access-Control-Allow-Origin';
    proxy_pass_header 'Access-Control-Allow-Credentials';
    
    # Don't intercept errors - pass them through
    proxy_intercept_errors off;
  }

  # Proxy specific BFF endpoints (exact matches for better priority)
  location = /login {
    proxy_pass http://nginx-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_intercept_errors off;
  }

  location = /logout {
    proxy_pass http://nginx-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_intercept_errors off;
  }

  location = /callback {
    proxy_pass http://nginx-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_intercept_errors off;
    
    # Pass through Set-Cookie headers from BFF
    # The cookie will be set on the frontend origin (localhost:8090) because
    # the request comes through the frontend nginx proxy
    proxy_pass_header 'Set-Cookie';
    proxy_cookie_path / /;
  }

  # Proxy Keycloak endpoints (realms, resources)
  location ~ ^/(realms|resources)/ {
    proxy_pass http://nginx-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_intercept_errors off;
  }

  location / {
    try_files $uri /index.html;
  }
}