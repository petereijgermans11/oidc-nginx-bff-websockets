worker_processes auto;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/lualib/?.lua;/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/nginx/?.lua;;";

    lua_shared_dict discovery 1m;
    lua_shared_dict jwks 1m;
    lua_shared_dict sessions 10m;

    # DNS resolver voor Docker (Docker's internal DNS)
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    access_log /dev/stdout;

    # Map for WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Upstreams with dynamic resolution
    upstream greeter_backend {
        server greeter-service:9090;
    }

    server {
        listen 8080;
        server_name localhost;

        set $ORIGIN http://localhost:8090;

        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
        }

        # Login endpoint - triggers OIDC flow
        location = /login {
            access_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local config = require "config"

                local opts = {
                    authorization_endpoint = config.AUTHORIZATION_ENDPOINT,
                    token_endpoint = config.TOKEN_ENDPOINT,
                    client_id = config.CLIENT_ID,
                    client_secret = config.CLIENT_SECRET,
                    redirect_uri = config.REDIRECT_URI,
                    scope = config.SCOPE
                }

                local auth_url = oidc_helper.build_authorization_url(opts)

                -- Store state and nonce in a temporary cookie for callback verification
                local state_data = {
                    state = ngx.ctx.oidc_state,
                    nonce = ngx.ctx.oidc_nonce,
                    timestamp = ngx.time()
                }
                local state_json = require("cjson").encode(state_data)
                local state_cookie = ngx.encode_base64(state_json)
                ngx.header["Set-Cookie"] = "oidc_state=" .. state_cookie .. "; Path=/; HttpOnly; SameSite=Lax; Max-Age=300"

                return ngx.redirect(auth_url)
            }
        }

        # User info endpoint - returns current user or 401 if not authenticated
        location = /api/user {
            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $ORIGIN always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            access_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local cjson = require "cjson"

                -- CORS headers
                ngx.header["Access-Control-Allow-Origin"] = ngx.var.ORIGIN
                ngx.header["Access-Control-Allow-Credentials"] = "true"

                local session = oidc_helper.get_session()
                if not session or not session.access_token then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({error = "Not authenticated"}))
                    return ngx.exit(401)
                end

                -- Return user info
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    authenticated = true,
                    sub = session.sub,
                    email = session.email,
                    name = session.name,
                    username = session.preferred_username
                }))
                return ngx.exit(200)
            }
        }

        # Proxy Keycloak endpoints (voor browser redirects via externe poort)
        location ~ ^/(realms|resources)/ {
            proxy_pass http://keycloak:8000;
            proxy_set_header Host localhost:8008;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 8008;
        }

        # WebSocket proxy - afgeschermd via BFF met Keycloak authenticatie
        location /ws/ {
            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $ORIGIN always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }
            
            access_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local config = require "config"
                local cjson = require "cjson"

                ngx.header["Access-Control-Allow-Origin"] = ngx.var.ORIGIN or "*"
                ngx.header["Access-Control-Allow-Credentials"] = "true"

                -- Get session and transparently refresh the access token when expired
                local session, err = oidc_helper.refresh_access_token({
                    token_endpoint      = config.TOKEN_ENDPOINT,
                    token_endpoint_host = config.TOKEN_ENDPOINT_HOST,
                    client_id           = config.CLIENT_ID,
                    client_secret       = config.CLIENT_SECRET
                })

                if not session or not session.access_token then
                    ngx.log(ngx.ERR, "WebSocket rejected – no valid session or refresh failed: ", err or "")
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({error = "WebSocket connection requires authentication"}))
                    return ngx.exit(401)
                end

                ngx.log(ngx.ERR, "WebSocket authenticated for user: ", session.sub or "unknown")
                ngx.req.set_header("Authorization", "Bearer " .. session.access_token)
                ngx.req.set_header("X-User-Id", session.sub or "")
            }
            
            # CORS headers for SockJS info requests
            add_header 'Access-Control-Allow-Origin' $ORIGIN always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            # Native NGINX WebSocket proxy
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeout settings (24 hours)
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            
            # Buffer settings for WebSocket
            proxy_buffering off;
            
            # Proxy to greeter-service (keep /ws/ path)
            proxy_pass http://greeter_backend;
        }

        # Protected API - proxies to greeter-service
        location /api/ {
            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $ORIGIN always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            access_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local config = require "config"

                -- Try to get session and transparently refresh the access token when expired
                local session, err = oidc_helper.refresh_access_token({
                    token_endpoint      = config.TOKEN_ENDPOINT,
                    token_endpoint_host = config.TOKEN_ENDPOINT_HOST,
                    client_id           = config.CLIENT_ID,
                    client_secret       = config.CLIENT_SECRET
                })

                if session and session.access_token then
                    ngx.req.set_header("X-User-Id", session.sub or "")
                    ngx.req.set_header("Authorization", "Bearer " .. session.access_token)
                    return
                end

                -- No valid session or refresh failed, redirect to Keycloak
                local opts = {
                    authorization_endpoint = config.AUTHORIZATION_ENDPOINT,
                    token_endpoint = config.TOKEN_ENDPOINT,
                    client_id = config.CLIENT_ID,
                    client_secret = config.CLIENT_SECRET,
                    redirect_uri = config.REDIRECT_URI,
                    scope = config.SCOPE
                }

                local auth_url = oidc_helper.build_authorization_url(opts)

                local state_data = {
                    state = ngx.ctx.oidc_state,
                    nonce = ngx.ctx.oidc_nonce,
                    timestamp = ngx.time()
                }
                local state_json = require("cjson").encode(state_data)
                local state_cookie = ngx.encode_base64(state_json)
                ngx.header["Set-Cookie"] = "oidc_state=" .. state_cookie .. "; Path=/; HttpOnly; SameSite=Lax; Max-Age=300"

                return ngx.redirect(auth_url)
            }

            # CORS headers on proxied responses
            add_header 'Access-Control-Allow-Origin' $ORIGIN always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # Rewrite /api/greeter/greet to /greeter/greet for backend
            rewrite ^/api/(.*)$ /$1 break;

            proxy_pass http://greeter_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OIDC callback
        location /callback {
            content_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local cjson = require "cjson"

                local args = ngx.req.get_uri_args()
                local code = args.code
                local state = args.state

                local config = require "config"

                if not code then
                    ngx.status = 400
                    ngx.say("Missing authorization code")
                    return ngx.exit(400)
                end

                -- Verify state and prevent replay attacks
                local state_cookie = ngx.var.cookie_oidc_state
                if not state_cookie then
                    ngx.status = 400
                    ngx.say("Missing state cookie")
                    return ngx.exit(400)
                end

                local state_json = ngx.decode_base64(state_cookie)
                if not state_json then
                    ngx.status = 400
                    ngx.say("Invalid state cookie")
                    return ngx.exit(400)
                end

                local ok, state_data = pcall(cjson.decode, state_json)
                if not ok or not state_data or state_data.state ~= state then
                    ngx.status = 400
                    ngx.say("Invalid state parameter")
                    return ngx.exit(400)
                end

                -- Clear state cookie immediately to prevent replay
                ngx.header["Set-Cookie"] = "oidc_state=; Path=/; HttpOnly; SameSite=Lax; Max-Age=0"

                -- Exchange code for tokens
                local opts = {
                    token_endpoint = config.TOKEN_ENDPOINT,
                    client_id = config.CLIENT_ID,
                    client_secret = config.CLIENT_SECRET,
                    redirect_uri = config.REDIRECT_URI
                }

                local tokens, err = oidc_helper.exchange_code_for_tokens(opts, code)
                if err then
                    ngx.log(ngx.ERR, "Token exchange error: ", err)
                    ngx.status = 500
                    ngx.say("Authentication failed: " .. err)
                    return ngx.exit(500)
                end

                -- Decode ID token to get user info (simple base64 decode, no verification for now)
                local id_token_parts = {}
                for part in string.gmatch(tokens.id_token, "[^%.]+") do
                    table.insert(id_token_parts, part)
                end

                local payload_json = ngx.decode_base64(id_token_parts[2])
                local ok, payload = pcall(cjson.decode, payload_json)

                local session_data = {
                    access_token = tokens.access_token,
                    id_token = tokens.id_token,
                    refresh_token = tokens.refresh_token,
                    sub = ok and payload.sub or nil,
                    email = ok and payload.email or nil,
                    name = ok and payload.name or nil,
                    preferred_username = ok and payload.preferred_username or nil
                }

                -- Set session cookie
                local session_cookie = oidc_helper.set_session(session_data, 3600)
                ngx.header["Set-Cookie"] = session_cookie

                -- Use meta refresh redirect to ensure cookies are saved
                -- Redirect to root of frontend (not $ORIGIN to avoid cross-origin cookie issues)
                ngx.header["Content-Type"] = "text/html; charset=utf-8"
                ngx.header["Cache-Control"] = "no-cache, no-store, must-revalidate"
                ngx.say([[<!DOCTYPE html>
<html><head>
<title>Login succesvol</title>
<meta http-equiv="refresh" content="1;url=/">
</head>
<body>
<p>Login succesvol! Redirecting to app...</p>
<script>
// Fallback redirect in case meta refresh doesn't work
setTimeout(function() {
    window.location.href = '/';
}, 1000);
</script>
</body></html>]])
                return ngx.exit(ngx.HTTP_OK)
            }
        }

        # Logout endpoint
        location /logout {
            content_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local cjson = require "cjson"

                -- Haal sessie op voordat we deze verwijderen
                local session = oidc_helper.get_session()

                -- Verwijder lokale sessie
                local clear_cookie = oidc_helper.clear_session()
                ngx.header["Set-Cookie"] = clear_cookie

                -- Als er geen sessie was, redirect direct naar webapp
                if not session or not session.id_token then
                    return ngx.redirect(ngx.var.ORIGIN)
                end

                local args = ngx.req.get_uri_args()
                local redirect_uri = args.redirect_uri or ngx.var.ORIGIN
                -- Redirect naar Keycloak logout met id_token_hint voor automatische logout
                -- post_logout_redirect_uri zorgt ervoor dat gebruiker direct wordt doorgestuurd
                -- id_token_hint zorgt ervoor dat Keycloak NIET om bevestiging vraagt
                local keycloak_logout = "http://localhost:8008/realms/greeter/protocol/openid-connect/logout" ..
                    "?post_logout_redirect_uri=" .. ngx.escape_uri(redirect_uri) ..
                    "&id_token_hint=" .. ngx.escape_uri(session.id_token)

                return ngx.redirect(keycloak_logout)
            }
        }

        # Redirect root to frontend on 8090
        # Root redirect to frontend (frontend runs on separate port 8090)
        location = / {
            return 302 http://localhost:8090;
        }
    }
}
