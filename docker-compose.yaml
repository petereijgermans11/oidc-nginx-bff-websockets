services:
  keycloak:
    image: 'quay.io/keycloak/keycloak:latest'
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: $KEYCLOAK_USERNAME
      KC_BOOTSTRAP_ADMIN_PASSWORD: $KEYCLOAK_PASSWORD
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME_URL: http://localhost:8008
      KC_HOSTNAME_ADMIN_URL: http://localhost:8000
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
    ports:
      - 8000:8000
    volumes:
      - ./keycloak/greeter_full-realm.json:/opt/keycloak/data/import/realm.json
    command: start-dev --http-port=8000 --import-realm
    healthcheck:
      test: "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10
  greeter-service:
    build: greeter-service
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - 9090:9090
    healthcheck:
      test: "curl -f http://localhost:8090/actuator/health/readiness"
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10
  nginx-gateway:
    build: nginx
    depends_on:
      greeter-service:
        condition: service_healthy
    ports:
      - 8008:8080
    healthcheck:
      test: "nc -z localhost 8080 || exit 1"
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 5
  greeter-app:
    build: greeter-app
    depends_on:
      greeter-service:
        condition: service_healthy
      nginx-gateway:
        condition: service_healthy
    ports:
      - 8090:80
    healthcheck:
      test: "nc -z localhost 80 || exit 1"
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 5